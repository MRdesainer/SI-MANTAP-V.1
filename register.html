<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daftar Akun - SI-MANTAP</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" id="regFavicon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%23059669' rx='20' width='100' height='100'/><text x='50' y='65' text-anchor='middle' font-size='36' font-weight='bold' fill='%23D4AF37'>MO</text></svg>">
</head>
<body class="login-bg-pattern">
  <div class="login-page">
    <div class="login-container">
      <div class="login-branding">
        <div class="mb-6">
          <div id="regLogoBox" class="w-20 h-20 bg-white/20 rounded-2xl flex items-center justify-center backdrop-blur-sm border border-white/30 overflow-hidden">
            <span id="regLogoText" class="text-3xl font-extrabold" style="color: #D4AF37;">MO</span>
          </div>
        </div>
        <h1><span id="regAppName">SI-MANTAP</span><br><span id="regTagline" class="text-sm font-normal text-white/80">Sistem Informasi Madrasah</span></h1>
        <p class="mt-4 text-white/70 leading-relaxed" id="regDesc">
          Daftar akun untuk mengakses sistem informasi madrasah.
        </p>
      </div>

      <div class="login-card">
        <div id="regCardLogo" class="login-logo">MO</div>
        <h2>Daftar Akun Baru</h2>
        <p id="regCardSubtitle" class="subtitle">Buat akun di <span id="regCardAppName">SI-MANTAP</span></p>

        <div id="reg-error" class="hidden mb-4 p-3 bg-red-50 border border-red-200 rounded-lg text-red-700 text-sm"></div>
        <div id="reg-success" class="hidden mb-4 p-3 bg-green-50 border border-green-200 rounded-lg text-green-700 text-sm"></div>

        <form id="registerForm" onsubmit="handleRegister(event)">
          <div class="form-group">
            <label class="form-label">Nama Lengkap</label>
            <input type="text" id="regNama" class="form-input" placeholder="Masukkan nama lengkap" required>
          </div>
          <div class="form-group">
            <label class="form-label">Email</label>
            <input type="email" id="regEmail" class="form-input" placeholder="Masukkan email" required>
          </div>
          <div class="form-group">
            <label class="form-label">Password</label>
            <div class="relative">
              <input type="password" id="regPassword" class="form-input" placeholder="Minimal 6 karakter" minlength="6" required>
              <button type="button" onclick="toggleRegPassword()" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
              </button>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Konfirmasi Password</label>
            <input type="password" id="regConfirm" class="form-input" placeholder="Ulangi password" minlength="6" required>
          </div>
          <div class="form-group">
            <label class="form-label">Daftar Sebagai</label>
            <select id="regRole" class="form-input" required>
              <option value="guru">Guru / PTK</option>
              <option value="ortu">Orang Tua / Wali</option>
            </select>
          </div>
          <button type="submit" id="regBtn" class="btn btn-primary w-full justify-center py-3 text-base font-semibold mt-4">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"/></svg>
            Daftar
          </button>
        </form>

        <div class="mt-6 pt-4 border-t border-gray-100 text-center">
          <p class="text-sm text-gray-500">Sudah punya akun? <a href="index.html" class="text-emerald-600 font-semibold hover:underline">Masuk</a></p>
        </div>

        <div class="mt-4 text-center">
          <p class="text-xs text-gray-400">Powered by Kang Misbah</p>
        </div>
      </div>
    </div>
  </div>

  <div id="loadingOverlay" class="loading-overlay hidden">
    <div class="text-center"><div class="spinner"></div><p class="mt-4 text-gray-600 font-medium">Memproses...</p></div>
  </div>
  <div id="toastContainer" class="toast-container"></div>

  <script src="js/config.js"></script>
  <script>
    (function(){
      var s = document.createElement('script');
      s.src = 'https://unpkg.com/@supabase/supabase-js@2';
      s.async = true;
      s.onload = function(){ try { initSupabase(); } catch(e) {} };
      s.onerror = function(){ console.warn('Supabase CDN gagal dimuat'); };
      document.head.appendChild(s);
    })();
  </script>
  <script src="js/sync.js"></script>
  <script src="js/db.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/seed.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      try { initSupabase(); } catch(e) {}
      await DB.pullAll();
      try { initLocalData(); } catch(e) {}
      if (Auth.checkSession()) window.location.href = 'app.html';
      applyRegSettings();
      window.addEventListener('storage', (e) => {
        if (e.key === 'mops_settings') applyRegSettings();
      });
    });

    function applyRegSettings() {
      try {
        const s = JSON.parse(localStorage.getItem('mops_settings') || '{}');
        const logoText = s.logoText || 'MO';
        const logoColor = s.logoColor || '#059669';
        const appName = s.appName || 'SI-MANTAP';
        const tagline = s.appTagline || 'Sistem Informasi Madrasah';

        document.getElementById('regLogoText').textContent = logoText;
        document.getElementById('regCardLogo').textContent = logoText;
        document.getElementById('regAppName').textContent = appName;
        document.getElementById('regCardAppName').textContent = appName;
        document.getElementById('regTagline').textContent = tagline;
        document.title = 'Daftar - ' + appName;

        if (s.appLogo) {
          document.getElementById('regLogoBox').innerHTML = '<img src="' + s.appLogo + '" style="width:100%;height:100%;object-fit:contain">';
          document.getElementById('regCardLogo').innerHTML = '<img src="' + s.appLogo + '" style="width:100%;height:100%;object-fit:contain">';
        } else {
          document.getElementById('regLogoBox').innerHTML = '<span class="text-3xl font-extrabold" style="color:#D4AF37">' + logoText + '</span>';
          document.getElementById('regCardLogo').innerHTML = logoText;
        }

        if (s.madrasahName) {
          document.getElementById('regDesc').textContent = 'Daftar akun untuk ' + s.madrasahName;
        }
      } catch(e) {}
    }

    async function handleRegister(e) {
      e.preventDefault();
      const btn = document.getElementById('regBtn');
      const errDiv = document.getElementById('reg-error');
      const succDiv = document.getElementById('reg-success');
      btn.disabled = true;
      btn.innerHTML = '<div class="spinner" style="width:20px;height:20px;border-width:2px;"></div> Mendaftarkan...';
      errDiv.classList.add('hidden');
      succDiv.classList.add('hidden');

      try {
        const nama = document.getElementById('regNama').value;
        const email = document.getElementById('regEmail').value;
        const pass = document.getElementById('regPassword').value;
        const confirm = document.getElementById('regConfirm').value;
        const role = document.getElementById('regRole').value;

        if (!nama || !email || !pass) {
          errDiv.textContent = 'Semua field wajib diisi';
          errDiv.classList.remove('hidden');
          btn.disabled = false;
          btn.innerHTML = '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"/></svg> Daftar';
          return;
        }

        if (pass !== confirm) {
          errDiv.textContent = 'Konfirmasi password tidak cocok';
          errDiv.classList.remove('hidden');
          btn.disabled = false;
          btn.innerHTML = '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"/></svg> Daftar';
          return;
        }

        const settings = JSON.parse(localStorage.getItem('mops_settings') || '{}');
        const madrasahId = settings.madrasahId || 'mad_001';
        const result = await Auth.register(email, pass, nama, role, madrasahId);

        btn.disabled = false;
        btn.innerHTML = '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"/></svg> Daftar';

        if (result.success) {
          document.getElementById('registerForm').reset();
          succDiv.textContent = 'Pendaftaran berhasil! Akun Anda akan aktif setelah diverifikasi admin. Silakan login.';
          succDiv.classList.remove('hidden');
          setTimeout(() => { window.location.href = 'index.html'; }, 3000);
        } else {
          errDiv.textContent = result.error;
          errDiv.classList.remove('hidden');
        }
      } catch (err) {
        console.error('Register error:', err);
        errDiv.textContent = 'Terjadi kesalahan: ' + err.message;
        errDiv.classList.remove('hidden');
        btn.disabled = false;
        btn.innerHTML = '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"/></svg> Daftar';
      }
    }

    function toggleRegPassword() {
      const input = document.getElementById('regPassword');
      input.type = input.type === 'password' ? 'text' : 'password';
    }

    function showToast(type, message) {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = `toast toast-${type}`;
      toast.innerHTML = message;
      container.appendChild(toast);
      setTimeout(() => { toast.classList.add('removing'); setTimeout(() => toast.remove(), 300); }, 3000);
    }
  </script>
</body>
</html>
